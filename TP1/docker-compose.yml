services:

  # ── Nó 1 do RabbitMQ (o principal, o "chefe" do cluster) ─────────
  rabbit1:
    image: rabbitmq:3.13-management
    hostname: rabbit1
    container_name: rabbit1
    environment:
      RABBITMQ_ERLANG_COOKIE: "TP01_SECRET_COOKIE"   # segredo compartilhado entre os nós
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"    # porta AMQP (onde os scripts Python se conectam)
      - "15672:15672"  # portal web de gerenciamento do RabbitMQ
    volumes:
      - rabbit1_data:/var/lib/rabbitmq
    networks:
      - rabbitmq_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Nó 2 (aguarda o nó 1 estar saudável antes de subir) ──────────
  rabbit2:
    image: rabbitmq:3.13-management
    hostname: rabbit2
    container_name: rabbit2
    environment:
      RABBITMQ_ERLANG_COOKIE: "TP01_SECRET_COOKIE"
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbit2_data:/var/lib/rabbitmq
    networks:
      - rabbitmq_net
    depends_on:
      rabbit1:
        condition: service_healthy

  # ── Nó 3 ─────────────────────────────────────────────────────────
  rabbit3:
    image: rabbitmq:3.13-management
    hostname: rabbit3
    container_name: rabbit3
    environment:
      RABBITMQ_ERLANG_COOKIE: "TP01_SECRET_COOKIE"
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5674:5672"
      - "15674:15672"
    volumes:
      - rabbit3_data:/var/lib/rabbitmq
    networks:
      - rabbitmq_net
    depends_on:
      rabbit1:
        condition: service_healthy

networks:
  rabbitmq_net:
    driver: bridge

volumes:
  rabbit1_data:
  rabbit2_data:
  rabbit3_data: