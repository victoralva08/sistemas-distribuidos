<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RabbitMQ Topology Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { background-color: #ffffff; color: #1e293b; font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 1rem 2rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; background-color: #f8fafc; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .legend { width: 120px; border-right: 2px solid #1e293b; padding: 1.5rem 0; display: flex; flex-direction: column; align-items: center; gap: 2rem; background: #ffffff; overflow-y: auto; }
        .network-container { flex: 1; position: relative; background-color: #ffffff; }
        #network { width: 100%; height: 100%; }
        
        /* Legend Shapes */
        .legend-item { display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; font-weight: 600; color: #0f172a; gap: 0.5rem; text-align: center; }
        .shape-exchange { width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-bottom: 24px solid #fb923c; }
        .shape-queue { width: 32px; height: 20px; background-color: #7dd3fc; border: 2px solid #0284c7; border-radius: 3px; }
        .shape-producer { width: 26px; height: 26px; border-radius: 50%; background-color: #5eead4; border: 2px solid #0f766e; }
        .shape-consumer { 
            width: 28px; height: 28px; background-color: #fde047; border: 2px solid #854d0e; 
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Mapa Topológico RabbitMQ</h1>
            <p class="text-sm text-slate-500 font-medium">Monitoramento em Tempo Real do TP01</p>
        </div>
        <div id="status-indicator" class="flex items-center text-sm font-semibold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-200">
            <span class="relative flex h-2 w-2 mr-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
            </span>
            Conectado
        </div>
    </header>

    <div class="main-container">
        <!-- Barra Lateral: Legenda -->
        <div class="legend">
            <div class="legend-item">
                <div class="shape-producer"></div>
                <span>producer</span>
            </div>
            <div class="legend-item">
                <div class="shape-exchange"></div>
                <span>exchange</span>
            </div>
            <div class="legend-item">
                <div class="shape-queue"></div>
                <span>queue</span>
            </div>
            <div class="legend-item">
                <div class="shape-consumer"></div>
                <span>consumer</span>
            </div>
        </div>

        <!-- Área Principal: Gráfico de Rede -->
        <div class="network-container">
            <div id="network"></div>
        </div>
    </div>

    <script>
        // Configuração dos Nós (Nodes)
        const nodes = new vis.DataSet([
            { id: 'producer', label: 'producer', shape: 'circle', color: { background: '#5eead4', border: '#0f766e' }, font: { face: 'Inter', size: 14 }, level: 0 },
            { id: 'exchange', label: 'ex\n(orders.exchange)', shape: 'triangle', color: { background: '#fb923c', border: '#c2410c' }, font: { face: 'Inter', size: 14 }, level: 1 },
            
            // Filas Principais
            { id: 'q_payment', label: 'orders.payment\nMsgs: 0', shape: 'box', color: { background: '#7dd3fc', border: '#0284c7' }, font: { face: 'Inter', size: 14 }, margin: 10, level: 2 },
            { id: 'q_stock', label: 'orders.stock\nMsgs: 0', shape: 'box', color: { background: '#7dd3fc', border: '#0284c7' }, font: { face: 'Inter', size: 14 }, margin: 10, level: 2 },
            { id: 'q_notification', label: 'orders.notification\nMsgs: 0', shape: 'box', color: { background: '#7dd3fc', border: '#0284c7' }, font: { face: 'Inter', size: 14 }, margin: 10, level: 2 },
            
            // Consumidores (inicialmente invisíveis)
            { id: 'c_payment', label: 'consumer1', shape: 'star', color: { background: '#fde047', border: '#854d0e' }, font: { face: 'Inter', size: 14 }, hidden: true, size: 20, level: 3 },
            { id: 'c_stock', label: 'consumer1', shape: 'star', color: { background: '#fde047', border: '#854d0e' }, font: { face: 'Inter', size: 14 }, hidden: true, size: 20, level: 3 },
            { id: 'c_notification', label: 'consumer1', shape: 'star', color: { background: '#fde047', border: '#854d0e' }, font: { face: 'Inter', size: 14 }, hidden: true, size: 20, level: 3 }
        ]);

        // Configuração das Conexões (Edges)
        const edges = new vis.DataSet([
            { id: 'e_prod_ex', from: 'producer', to: 'exchange', arrows: 'to', color: { color: '#000000' }, width: 2 },
            
            // Ligações Exchange -> Queues
            { id: 'e_ex_pay', from: 'exchange', to: 'q_payment', label: 'payment', arrows: 'to', color: { color: '#000000' }, font: { align: 'top', face: 'Inter' } },
            { id: 'e_ex_stk', from: 'exchange', to: 'q_stock', label: 'stock', arrows: 'to', color: { color: '#000000' }, font: { align: 'top', face: 'Inter' } },
            { id: 'e_ex_not', from: 'exchange', to: 'q_notification', label: 'notification', arrows: 'to', color: { color: '#000000' }, font: { align: 'top', face: 'Inter' } },
            
            // Ligações Queues -> Consumers
            { id: 'e_pay_c', from: 'q_payment', to: 'c_payment', arrows: 'to', color: { color: '#000000' } },
            { id: 'e_stk_c', from: 'q_stock', to: 'c_stock', arrows: 'to', color: { color: '#000000' } },
            { id: 'e_not_c', from: 'q_notification', to: 'c_notification', arrows: 'to', color: { color: '#000000' } }
        ]);

        // Configuração da Rede Vis.js
        const container = document.getElementById('network');
        const data = { nodes: nodes, edges: edges };
        const options = {
            layout: {
                hierarchical: {
                    direction: 'LR',
                    sortMethod: 'directed',
                    levelSeparation: 250,
                    nodeSpacing: 100
                }
            },
            physics: false,
            interaction: { dragNodes: true, zoomView: true, dragView: true },
            edges: { smooth: false } // Linhas retas puras para que a animação linear passe EXATAMENTE por cima delas
        };

        const network = new vis.Network(container, data, options);

        // --- SISTEMA DE ANIMAÇÃO DE BOLINHAS ---
        let particles = [];
        
        function spawnParticle(fromId, toId, color) {
            particles.push({
                from: fromId,
                to: toId,
                progress: 0,
                color: color,
                speed: 0.01 + Math.random() * 0.02 // Velocidade variável
            });
        }

        // Desenha as partículas por cima do canvas
        network.on("afterDrawing", function (ctx) {
            const pos = network.getPositions();
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.progress += p.speed;
                if (p.progress >= 1) {
                    particles.splice(i, 1);
                    continue;
                }
                
                let pos1 = pos[p.from];
                let pos2 = pos[p.to];
                if (!pos1 || !pos2) continue;

                // Interpolação linear da posição
                let x = pos1.x + (pos2.x - pos1.x) * p.progress;
                let y = pos1.y + (pos2.y - pos1.y) * p.progress;

                ctx.beginPath();
                ctx.arc(x, y, 5, 0, 2 * Math.PI, false);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.lineWidth = 1;
                ctx.strokeStyle = "#1e293b";
                ctx.stroke();
            }
        });

        // Loop de animação contínuo
        function animate() {
            if (particles.length > 0) {
                network.redraw(); // Força o redrawn para animar
            }
            requestAnimationFrame(animate);
        }
        animate();
        // ----------------------------------------

        // SSE: Recebendo dados em tempo real
        const eventSource = new EventSource("/stream");
        const statusInd = document.getElementById('status-indicator');

        function updateQueueStatus(queueName, nodeId, consumerId, queuesData) {
            const qData = queuesData[queueName];
            if (qData) {
                const msgs = qData.messages || 0;
                const consumersCount = qData.consumers || 0;
                const acked = qData.acked || 0;
                
                nodes.update({ id: nodeId, label: queueName + '\nMsgs: ' + msgs });
                
                if (consumersCount > 0 && consumerId) {
                    nodes.update({ id: consumerId, hidden: false, label: 'consumer (' + consumersCount + ')\nFeito: ' + acked });
                } else if(consumerId) {
                    nodes.update({ id: consumerId, hidden: true });
                }
            }
        }

        eventSource.onmessage = function(event) {
            const result = JSON.parse(event.data);
            
            if (result.error) {
                statusInd.classList.replace('text-emerald-600', 'text-amber-600');
                statusInd.classList.replace('bg-emerald-50', 'bg-amber-50');
                statusInd.classList.replace('border-emerald-200', 'border-amber-200');
                statusInd.innerHTML = `<span class="h-2 w-2 mr-2 rounded-full bg-amber-500"></span> API Offline`;
                return;
            } else {
                statusInd.classList.replace('text-amber-600', 'text-emerald-600');
                statusInd.classList.replace('text-red-600', 'text-emerald-600');
                statusInd.classList.replace('bg-amber-50', 'bg-emerald-50');
                statusInd.classList.replace('bg-red-50', 'bg-emerald-50');
                statusInd.classList.replace('border-amber-200', 'border-emerald-200');
                statusInd.classList.replace('border-red-200', 'border-emerald-200');
                statusInd.innerHTML = `<span class="relative flex h-2 w-2 mr-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span> Conectado`;
            }

            if (result.status === "ok" && result.queues) {
                updateQueueStatus('orders.payment', 'q_payment', 'c_payment', result.queues);
                updateQueueStatus('orders.stock', 'q_stock', 'c_stock', result.queues);
                updateQueueStatus('orders.notification', 'q_notification', 'c_notification', result.queues);
                
                // --- GERAÇÃO DE BOLINHAS BASEADO NAS TAXAS ---
                const pRate = result.publish_rate || 0;
                const dRate = result.deliver_rate || 0;

                // Spawna bolinhas entrando (Producer -> Exchange)
                if (pRate > 0) {
                    let amount = Math.min(Math.floor(pRate / 10) + 1, 5); // limite de max partículas visuais
                    for(let i=0; i<amount; i++) spawnParticle('producer', 'exchange', '#5eead4');
                    
                    // Do Exchange para as filas aleatórias (simulando roteamento)
                    const queueIds = ['q_payment', 'q_stock', 'q_notification'];
                    for(let i=0; i<amount; i++) {
                        let targetQ = queueIds[Math.floor(Math.random()*queueIds.length)];
                        spawnParticle('exchange', targetQ, '#fb923c');
                    }
                }

                // Spawna bolinhas saindo (Queues -> Consumers)
                if (dRate > 0) {
                    let amount = Math.min(Math.floor(dRate / 10) + 1, 5);
                    const consumers = [];
                    if(!nodes.get('c_payment').hidden) consumers.push({q: 'q_payment', c: 'c_payment'});
                    if(!nodes.get('c_stock').hidden) consumers.push({q: 'q_stock', c: 'c_stock'});
                    if(!nodes.get('c_notification').hidden) consumers.push({q: 'q_notification', c: 'c_notification'});
                    
                    for(let i=0; i<amount; i++) {
                        if (consumers.length > 0) {
                            let pair = consumers[Math.floor(Math.random()*consumers.length)];
                            spawnParticle(pair.q, pair.c, '#fde047');
                        }
                    }
                }
            }
        };

        eventSource.onerror = function() {
            statusInd.classList.replace('text-emerald-600', 'text-red-600');
            statusInd.classList.replace('bg-emerald-50', 'bg-red-50');
            statusInd.classList.replace('border-emerald-200', 'border-red-200');
            statusInd.innerHTML = `<span class="h-2 w-2 mr-2 rounded-full bg-red-500"></span> Conexão Perdida`;
        };
    </script>
</body>
</html>
